<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="15" fill="url(#bg)" />
  
  <g transform="translate(15, 15)" filter="url(#shadow)">
    <!-- Bank -->
    <rect x="0" y="50" width="25" height="4" fill="#a1887f" rx="1" />
    <rect x="0" y="42" width="25" height="4" fill="#a1887f" rx="1" />
    <rect x="3" y="42" width="2" height="15" fill="#5d4037" />
    <rect x="20" y="42" width="2" height="15" fill="#5d4037" />

    <!-- Ağaç -->
    <rect x="52" y="30" width="4" height="25" fill="#5d4037" rx="1" />
    <circle cx="54" cy="22" r="14" fill="#81c784" />
    <circle cx="45" cy="30" r="10" fill="#aed581" />
    <circle cx="63" cy="28" r="11" fill="#66bb6a" />
    
    <!-- Çöp Kutusu -->
    <rect x="33" y="48" width="6" height="9" fill="#90a4ae" rx="1" />
    <rect x="31" y="46" width="10" height="2" fill="#607d8b" rx="1" />
  </g>
</svg>
